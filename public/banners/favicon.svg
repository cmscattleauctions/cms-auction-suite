<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#111820"/>
  <!-- Gavel head -->
  <rect x="5" y="10" width="13" height="7" rx="2" fill="#35679a" transform="rotate(-45 11.5 13.5)"/>
  <!-- Gavel highlight stripe -->
  <rect x="5" y="13" width="13" height="2.5" fill="#4385c8" transform="rotate(-45 11.5 14.25)"/>
  <!-- Handle -->
  <line x1="17" y1="17" x2="26" y2="26" stroke="#4385c8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Strike mark / sound lines -->
  <line x1="6" y1="5" x2="8" y2="7" stroke="#4385c8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="3" x2="10" y2="6" stroke="#4385c8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="4" x2="13" y2="7" stroke="#4385c8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
</svg>
